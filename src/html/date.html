<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel=”canonical” href=”https://onlyraab.com/<!--URL-->”/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="<!--TITLE--> | <!--DATE--> | <!--KEYWORDS-->">
    <meta name="keywords" content="<!--KEYWORDS-->">
    <meta name="author" content="OnlyRaab.com | derRaab">
    <title><!--TITLE--> | <!--DATE--></title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://onlyraab.com">
    <meta property="og:title" content="<!--TITLE-->">
    <meta property="og:description" content="<!--TITLE--> | <!--DATE--> | <!--KEYWORDS-->">
    
    <!-- Primary image - 1200x630 (1.91:1 aspect ratio) -->
    <meta property="og:image" content="https://onlyraab.com/<!--OG_IMAGE_URL-->">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/jpeg">
    
    <meta property="og:site_name" content="<!--TITLE--> | <!--DATE--> | <!--KEYWORDS-->">
    
    <!-- Twitter will use Open Graph fallbacks -->
    <meta name="twitter:card" content="summary_large_image">
    <!-- Twitter will use og:image, og:title, og:description automatically -->
    
    <!-- Load the compiled LESS styles -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="body--date">
    <header>
        <h1><!--DATE_SPANS--></h1>
        <h2><!--TITLE--></h2>
        <h3 class="scroll-down">↓ Details ↓</h3>
    </header>
    <article>
        <section class="dates">
<!--ARTICLE_DATA-->
        </section>
    </article>
    <footer>
        <ul>
            <!--PREVIOUS-->
            <li><a href="/" title="Home">Home</a></li>
            <!--NEXT-->
        </ul>
    </footer>
    
    <!-- Load the compiled TypeScript -->
    <script type="module" src="index.js"></script>
</body>
</html>
